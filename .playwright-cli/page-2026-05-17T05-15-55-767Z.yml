                - strong [ref=e686]: 对于非官方移植版产生的任何问题，请不要向原作者反馈！
              - paragraph [ref=e687]: 补丁
              - paragraph [ref=e688]:
                - text: 本模组目前不支持AMD系列显卡。请使用
                - link "AMD-Patch-for-Voxy" [ref=e689]:
                  - /url: javascript:void(0);
                - text: 来让AMD显卡正常工作。
              - paragraph [ref=e690]: 此补丁需要与 Voxy 一同安装。
