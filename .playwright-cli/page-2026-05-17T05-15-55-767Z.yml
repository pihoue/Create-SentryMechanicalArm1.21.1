          - list [ref=e595]:
            - listitem [ref=e596]:
              - paragraph [ref=e597]:
                - generic [ref=e598]: 概述
              - paragraph [ref=e599]: 这是一款适用于 MC 的轻量级低开销 LoD 模组，即使在低端设备上也能渲染极端渲染距离。
              - paragraph [ref=e600]: 适用于支持 OpenGL 4.6 的系统，目前在 Linux AMD Mesa 上存在一些问题，具体情况和原因不明，可自行尝试。
              - paragraph [ref=e601]: 特点
              - list [ref=e602]:
                - listitem [ref=e603]:
                  - paragraph [ref=e604]: 使用 LoD 实现远距离渲染，可在可玩性帧率下渲染 4096 格以上的渲染距离；
                - listitem [ref=e605]:
                  - paragraph [ref=e606]: 在探索过程中，将远处的地形转换为 LoD 低模；
                - listitem [ref=e607]:
                  - paragraph [ref=e608]: 不完全支持光影包和其它优化模组，可能会出现很多问题，但如果调整设置，其中一些光影可以正常工作。
              - paragraph [ref=e609]:
                - generic [ref=e610]: 其他
              - paragraph [ref=e611]: 模组 LOGO 由 Devin 制作，经 Moonkey 修改。
              - paragraph [ref=e612]: 作者允许将该模组添加到整合包中，但需要同时链回 Modrinth 发布链接。
              - paragraph [ref=e613]: 非官方移植版
