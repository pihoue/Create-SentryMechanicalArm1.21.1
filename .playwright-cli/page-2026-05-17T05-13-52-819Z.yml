                - strong [ref=e680]: 对于非官方移植版产生的任何问题，请不要向原作者反馈！
              - paragraph [ref=e681]: 补丁
              - paragraph [ref=e682]:
                - text: 本模组目前不支持AMD系列显卡。请使用
                - link "AMD-Patch-for-Voxy" [ref=e683]:
                  - /url: javascript:void(0);
                - text: 来让AMD显卡正常工作。
              - paragraph [ref=e684]: 此补丁需要与 Voxy 一同安装。
              - paragraph [ref=e685]: 服务端支持
              - paragraph [ref=e686]:
                - text: 目前该模组暂无服务端支持。如果想要在服务器中使用，可以参考与拓展
                - link "FakeSight" [ref=e687]:
