          - list [ref=e589]:
            - listitem [ref=e590]:
              - paragraph [ref=e591]:
                - generic [ref=e592]: 概述
              - paragraph [ref=e593]: 这是一款适用于 MC 的轻量级低开销 LoD 模组，即使在低端设备上也能渲染极端渲染距离。
              - paragraph [ref=e594]: 适用于支持 OpenGL 4.6 的系统，目前在 Linux AMD Mesa 上存在一些问题，具体情况和原因不明，可自行尝试。
              - paragraph [ref=e595]: 特点
              - list [ref=e596]:
                - listitem [ref=e597]:
                  - paragraph [ref=e598]: 使用 LoD 实现远距离渲染，可在可玩性帧率下渲染 4096 格以上的渲染距离；
                - listitem [ref=e599]:
                  - paragraph [ref=e600]: 在探索过程中，将远处的地形转换为 LoD 低模；
                - listitem [ref=e601]:
                  - paragraph [ref=e602]: 不完全支持光影包和其它优化模组，可能会出现很多问题，但如果调整设置，其中一些光影可以正常工作。
              - paragraph [ref=e603]:
                - generic [ref=e604]: 其他
              - paragraph [ref=e605]: 模组 LOGO 由 Devin 制作，经 Moonkey 修改。
              - paragraph [ref=e606]: 作者允许将该模组添加到整合包中，但需要同时链回 Modrinth 发布链接。
              - paragraph [ref=e607]: 非官方移植版
